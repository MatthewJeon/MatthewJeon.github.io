<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Matthew Hwyjoon Jeon — AI Researcher</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Matthew Hwyjoon Jeon (전휘준) — AI Researcher & Engineer. Generative Models, Diffusion, LLMs, Multimodal AI.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500&display=swap" rel="stylesheet">

  <style>
    html, body { margin: 0; padding: 0; background: #fff; height: 100%; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif; }
    #root { height: 100%; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="v4-macapp.jsx"></script>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [lang, setLang] = useState(() => localStorage.getItem("pf.lang") || "en");
      const [dark, setDark] = useState(() => {
        const saved = localStorage.getItem("pf.dark");
        if (saved != null) return saved === "1";
        return window.matchMedia?.("(prefers-color-scheme: dark)").matches || false;
      });
      const [tag, setTag] = useState(null);
      useEffect(() => { localStorage.setItem("pf.lang", lang); }, [lang]);
      useEffect(() => {
        localStorage.setItem("pf.dark", dark ? "1" : "0");
        document.documentElement.style.background = dark ? "#1d1d1f" : "#fff";
      }, [dark]);
      return <V4MacApp lang={lang} setLang={setLang} dark={dark} setDark={setDark} tag={tag} setTag={setTag} />;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</head>
<body>
</body>
</html>
